[tools]
rust = "1.95.0"
node = "22.19.0"
helm = "4.1.4"
just = "1.50.0"
actionlint = "1.7.12"
markdownlint-cli2 = "0.22.1"
jq = "1.8.1"
gitleaks = "8.30.1"
trivy = "0.70.0"
checkov = "3.2.526"
shellcheck = "0.11.0"
shfmt = "3.13.1"
typos = "1.46.2"
kubectl = "1.36.1"
kind = "0.31.0"
cosign = "3.0.6"
crane = "0.21.5"
"cargo:cargo-deny" = "0.19.5"
"cargo:cargo-llvm-cov" = "0.8.6"
"cargo:cargo-machete" = "0.9.2"
"cargo:cargo-mutants" = "27.0.0"
"cargo:cargo-fuzz" = "0.13.1"

[tasks.default]
description = "List project tasks"
run = "just --list"

[tasks.check]
description = "Run the normal local preflight"
run = "just check"

[tasks.ci]
description = "Run the broader local CI mirror"
run = "just ci"

[tasks.release-check]
description = "Verify the release version gate, e.g. mise run release-check -- 0.3.0"
run = "just release-check \"$@\""

[tasks.smoke]
description = "Run the live ESO smoke test with caller-provided BWESO_E2E_* env"
run = "just live-smoke"
