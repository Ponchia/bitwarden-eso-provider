name: Fuzz

on:
  # checkov:skip=CKV_GHA_7:manual maintainer input only controls fuzz duration
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "Per-target fuzz duration in seconds"
        required: true
        default: "300"
  schedule:
    # Weekly fuzz run, off-peak
    - cron: "37 4 * * 1"

permissions:
  contents: read

jobs:
  encrypted-string:
    name: encrypted_string_from_str
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: crates/bweso-bitwarden/fuzz -> target

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked --version 0.13.1

      - name: Run fuzz target
        run: |
          duration="${{ github.event.inputs.duration_seconds || '300' }}"
          cd crates/bweso-bitwarden/fuzz
          cargo +nightly fuzz run encrypted_string_from_str \
            -- -max_total_time="$duration" -timeout=10

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-crashes-encrypted-string
          path: crates/bweso-bitwarden/fuzz/artifacts/
          if-no-files-found: ignore
