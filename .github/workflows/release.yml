name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      CHECKOV_IMAGE: bridgecrew/checkov:3.2.526@sha256:93a910a5854dce9b9935c18e96574162dec7ef2f07b819fd6af19f2e16ea306c
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
      HELM_VERSION: v4.1.4
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify release versions
        if: startsWith(github.ref, 'refs/tags/')
        run: bash scripts/verify-release-version.sh "${GITHUB_REF_NAME}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@b550161ef8a7bc4f2a671c0b03a18ac9ccedea1e # v2
        with:
          tool: cargo-llvm-cov@0.8.6

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Test with coverage guard
        run: cargo llvm-cov --locked --workspace --all-targets --fail-under-lines 80 --summary-only

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint chart
        run: helm lint deploy/helm/vaultwarden-eso-provider -f deploy/helm/lint-values.yaml

      - name: Render chart
        run: helm template bweso deploy/helm/vaultwarden-eso-provider -f deploy/helm/lint-values.yaml --namespace bweso-system

      - name: Render chart with selector policy, NetworkPolicy, and ServiceMonitor
        run: >
          helm template bweso deploy/helm/vaultwarden-eso-provider
          -f deploy/helm/lint-values.yaml
          --namespace bweso-system
          --set-string 'selectorPolicy.allowedKeys[0]=id:example-item'
          --set-string 'selectorPolicy.allowedKeyPrefixes[0]=id:team-a/'
          --set networkPolicy.enabled=true
          --set metrics.serviceMonitor.enabled=true
          --set-string 'metrics.serviceMonitor.labels.release=prometheus'
          --set-string 'hostAliases[0].ip=10.43.186.117'
          --set-string 'hostAliases[0].hostnames[0]=vaultwarden.example.com'

      - name: Validate selector-policy Helm contracts
        run: bash scripts/helm-policy-contracts.sh

      - name: Validate documentation
        run: npx --yes markdownlint-cli2@0.22.1 '**/*.md'

      - name: Validate observability examples
        run: |
          jq -e . examples/grafana/*.json >/dev/null
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.safe_load(File.read(path), aliases: true) }' examples/prometheus/*.yaml
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.safe_load(File.read(path), aliases: true) }' deploy/eso/*.yaml

      - name: Install Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          printf '%s  %s\n' "${GITLEAKS_LINUX_X64_SHA256}" /tmp/gitleaks.tar.gz | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks
        run: gitleaks detect --source . --redact --exit-code 1

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.5 --locked

      - name: Cargo advisory and license policy
        run: cargo deny --locked check advisories licenses bans sources

      - name: Checkov Helm scan
        run: >
          docker run --rm
          -v "$PWD:/repo"
          --workdir /repo
          "$CHECKOV_IMAGE"
          -d deploy/helm/vaultwarden-eso-provider
          --framework helm
          --var-file deploy/helm/lint-values.yaml
          --skip-check CKV_K8S_21
          --quiet

  image-platform:
    name: Image (${{ matrix.platform }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_slug: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform_slug: linux-arm64
            runner: ubuntu-24.04-arm
    env:
      DOCKER_METADATA_SHORT_SHA_LENGTH: 12
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Normalize image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform_slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_slug }}
          sbom: true
          provenance: true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ matrix.platform_slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  image:
    name: Image manifest
    needs: image-platform
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      attestations: write
      id-token: write
      packages: write
    outputs:
      image_ref: ${{ steps.image_ref.outputs.ref }}
      image_digest: ${{ steps.image_digest.outputs.digest }}
    env:
      DOCKER_METADATA_SHORT_SHA_LENGTH: 12
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Normalize image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list
        run: |
          tag_args=()
          while IFS= read -r tag; do
            tag_args+=("-t" "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          sources=()
          while IFS= read -r digest_file; do
            sources+=("${{ steps.image.outputs.name }}@sha256:$(basename "$digest_file")")
          done < <(find /tmp/digests -type f -print | sort)

          if [ "${#tag_args[@]}" -eq 0 ]; then
            echo "No image tags were generated" >&2
            exit 1
          fi

          if [ "${#sources[@]}" -eq 0 ]; then
            echo "No platform digests were downloaded" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

      - name: Select image reference
        id: image_ref
        run: echo "ref=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")" >> "$GITHUB_OUTPUT"

      - name: Capture image index digest
        id: image_digest
        run: |
          digest="$(
            docker buildx imagetools inspect "${{ steps.image_ref.outputs.ref }}" \
              | awk '/^Digest:/ { print $2; exit }'
          )"
          if [ -z "$digest" ]; then
            echo "Failed to capture image index digest" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Trivy release image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image_ref.outputs.ref }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        run: |
          cosign sign --yes \
            "${{ steps.image.outputs.name }}@${{ steps.image_digest.outputs.digest }}"

      - name: Attest image provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.image_digest.outputs.digest }}
          push-to-registry: true

  chart:
    name: Chart
    needs: image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      HELM_VERSION: v4.1.4
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Package chart
        run: |
          mkdir -p dist
          helm lint deploy/helm/vaultwarden-eso-provider -f deploy/helm/lint-values.yaml
          helm package deploy/helm/vaultwarden-eso-provider --destination dist

      - name: Log in to GHCR for Helm
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Push chart to GHCR OCI
        id: helm_push
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          chart_archive="$(find dist -maxdepth 1 -name '*.tgz' -print -quit)"
          if [ -z "$chart_archive" ]; then
            echo "No packaged chart archive found" >&2
            exit 1
          fi

          oci_registry="oci://ghcr.io/${owner}/charts"
          helm push "$chart_archive" "$oci_registry" | tee /tmp/helm-push.txt
          digest="$(awk '/Digest:/ { print $2; exit }' /tmp/helm-push.txt)"
          if [ -z "$digest" ]; then
            echo "Failed to capture OCI chart digest" >&2
            exit 1
          fi
          echo "registry=$oci_registry" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

          {
            echo "### Helm OCI chart"
            echo
            echo "- Registry: \`$oci_registry\`"
            echo "- Archive: \`$(basename "$chart_archive")\`"
            sed 's/^/- /' /tmp/helm-push.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign chart archive
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          chart_archive="$(find dist -maxdepth 1 -name '*.tgz' -print -quit)"
          if [ -z "$chart_archive" ]; then
            echo "No packaged chart archive found" >&2
            exit 1
          fi
          cosign sign-blob --yes \
            --bundle "${chart_archive}.sigstore.json" \
            "$chart_archive"

      - name: Attest chart archive provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: dist/*.tgz

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq .body > dist/generated-release-notes.md

      - name: Write release evidence
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          chart_archive="$(find dist -maxdepth 1 -name '*.tgz' -print -quit)"
          if [ -z "$chart_archive" ]; then
            echo "No packaged chart archive found" >&2
            exit 1
          fi
          chart_sha="$(sha256sum "$chart_archive" | awk '{ print $1 }')"
          chart_name="$(basename "$chart_archive")"
          version="${GITHUB_REF_NAME#v}"
          bundle_name="${chart_name}.sigstore.json"

          {
            if [ -s dist/generated-release-notes.md ]; then
              cat dist/generated-release-notes.md
              echo
            else
              echo "## Changes"
              echo
              echo "Generated release notes were unavailable for this tag."
              echo
            fi

            cat <<EOF
          ## Release evidence

          - Source commit: \`${GITHUB_SHA}\`
          - Image: \`${{ needs.image.outputs.image_ref }}\`
          - Image index digest: \`${{ needs.image.outputs.image_digest }}\`
          - Image signature: keyless Sigstore signature on the image digest
          - Image provenance: GitHub artifact attestation on the image digest
          - OCI Helm chart: \`${{ steps.helm_push.outputs.registry }}/vaultwarden-eso-provider --version ${version}\`
          - OCI Helm chart digest: \`${{ steps.helm_push.outputs.digest }}\`
          - GitHub Release chart archive: \`${chart_name}\`
          - Chart archive SHA256: \`${chart_sha}\`
          - Chart archive Sigstore bundle: \`${bundle_name}\`
          - Chart archive provenance: GitHub artifact attestation on the archive

          ## Verification

          The release workflow completed formatting, clippy, coverage-gated tests,
          Helm lint/template checks, documentation validation, Gitleaks, Trivy
          filesystem scanning, cargo-deny, Checkov, multi-arch image publishing,
          release-image Trivy scan, keyless image signing, image provenance
          attestation, OCI Helm chart publishing, chart archive signing, chart
          archive provenance attestation, and GitHub Release chart attachment.
          EOF
          } > dist/release-notes.md

          # Strip heredoc indentation from the workflow YAML.
          sed -i 's/^          //' dist/release-notes.md

      - name: Upload chart artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: helm-chart
          path: |
            dist/*.tgz
            dist/*.sigstore.json

      - name: Attach chart to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: dist/release-notes.md
          files: |
            dist/*.tgz
            dist/*.sigstore.json
