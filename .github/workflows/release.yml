name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked --workspace --all-targets

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint deploy/helm/bitwarden-eso-provider -f deploy/helm/lint-values.yaml

      - name: Render chart
        run: helm template bweso deploy/helm/bitwarden-eso-provider -f deploy/helm/lint-values.yaml --namespace bweso-system

      - name: Render chart with selector policy, NetworkPolicy, and ServiceMonitor
        run: >
          helm template bweso deploy/helm/bitwarden-eso-provider
          -f deploy/helm/lint-values.yaml
          --namespace bweso-system
          --set-string 'selectorPolicy.allowedKeys[0]=id:example-item'
          --set-string 'selectorPolicy.allowedKeyPrefixes[0]=id:team-a/'
          --set networkPolicy.enabled=true
          --set metrics.serviceMonitor.enabled=true
          --set-string 'metrics.serviceMonitor.labels.release=prometheus'
          --set-string 'hostAliases[0].ip=10.43.186.117'
          --set-string 'hostAliases[0].hostnames[0]=vaultwarden.example.com'

      - name: Validate observability examples
        run: |
          jq -e . examples/grafana/*.json >/dev/null
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.safe_load(File.read(path), aliases: true) }' examples/prometheus/*.yaml

      - name: Install Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks
        run: gitleaks detect --source . --redact --exit-code 1

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.5 --locked

      - name: Cargo advisory and license policy
        run: cargo deny --locked check advisories licenses bans sources

      - name: Install Checkov
        run: python -m pip install --upgrade checkov

      - name: Checkov Helm scan
        run: >
          checkov -d deploy/helm/bitwarden-eso-provider
          --framework helm
          --var-file deploy/helm/lint-values.yaml
          --skip-check CKV_K8S_21
          --quiet

  image-platform:
    name: Image (${{ matrix.platform }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_slug: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform_slug: linux-arm64
            runner: ubuntu-24.04-arm
    env:
      DOCKER_METADATA_SHORT_SHA_LENGTH: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform_slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_slug }}
          sbom: true
          provenance: true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.platform_slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  image:
    name: Image manifest
    needs: image-platform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_METADATA_SHORT_SHA_LENGTH: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list
        run: |
          tag_args=()
          while IFS= read -r tag; do
            tag_args+=("-t" "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          sources=()
          while IFS= read -r digest_file; do
            sources+=("${{ steps.image.outputs.name }}@sha256:$(basename "$digest_file")")
          done < <(find /tmp/digests -type f -print | sort)

          if [ "${#tag_args[@]}" -eq 0 ]; then
            echo "No image tags were generated" >&2
            exit 1
          fi

          if [ "${#sources[@]}" -eq 0 ]; then
            echo "No platform digests were downloaded" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

      - name: Select image reference
        id: image_ref
        run: echo "ref=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")" >> "$GITHUB_OUTPUT"

      - name: Trivy release image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image_ref.outputs.ref }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  chart:
    name: Chart
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Package chart
        run: |
          mkdir -p dist
          helm lint deploy/helm/bitwarden-eso-provider -f deploy/helm/lint-values.yaml
          helm package deploy/helm/bitwarden-eso-provider --destination dist

      - name: Upload chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: helm-chart
          path: dist/*.tgz

      - name: Attach chart to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.tgz
