name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.6

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Test with coverage guard
        run: cargo llvm-cov --locked --workspace --all-targets --fail-under-lines 80 --summary-only

  helm:
    name: Helm
    runs-on: ubuntu-latest
    env:
      HELM_VERSION: v4.1.4
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint chart
        run: helm lint deploy/helm/bitwarden-eso-provider -f deploy/helm/lint-values.yaml

      - name: Render chart
        run: helm template bweso deploy/helm/bitwarden-eso-provider -f deploy/helm/lint-values.yaml --namespace bweso-system

      - name: Render chart with selector policy and network controls
        run: >
          helm template bweso deploy/helm/bitwarden-eso-provider
          -f deploy/helm/lint-values.yaml
          --namespace bweso-system
          --set-string 'selectorPolicy.allowedKeys[0]=id:example-item'
          --set-string 'selectorPolicy.allowedKeyPrefixes[0]=id:team-a/'
          --set networkPolicy.enabled=true
          --set-string 'hostAliases[0].ip=10.43.186.117'
          --set-string 'hostAliases[0].hostnames[0]=vaultwarden.example.com'

      - name: Render chart with ServiceMonitor
        run: >
          helm template bweso deploy/helm/bitwarden-eso-provider
          -f deploy/helm/lint-values.yaml
          --namespace bweso-system
          --set metrics.serviceMonitor.enabled=true
          --set-string 'metrics.serviceMonitor.labels.release=prometheus'

      - name: Validate documentation
        run: npx --yes markdownlint-cli2@0.22.1 '**/*.md'

      - name: Validate observability examples
        run: |
          jq -e . examples/grafana/*.json >/dev/null
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.safe_load(File.read(path), aliases: true) }' examples/prometheus/*.yaml
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.safe_load(File.read(path), aliases: true) }' deploy/eso/*.yaml

  security:
    name: Security
    runs-on: ubuntu-latest
    env:
      CHECKOV_VERSION: 3.2.526
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          printf '%s  %s\n' "${GITLEAKS_LINUX_X64_SHA256}" /tmp/gitleaks.tar.gz | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks
        run: gitleaks detect --source . --redact --exit-code 1

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: security-cargo-deny

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.5 --locked

      - name: Cargo advisory and license policy
        run: cargo deny --locked check advisories licenses bans sources

      - name: Install Checkov
        run: python -m pip install "checkov==${CHECKOV_VERSION}"

      - name: Checkov Helm scan
        run: >
          checkov -d deploy/helm/bitwarden-eso-provider
          --framework helm
          --var-file deploy/helm/lint-values.yaml
          --skip-check CKV_K8S_21
          --quiet

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check Dockerfile
        run: docker buildx build --check .
