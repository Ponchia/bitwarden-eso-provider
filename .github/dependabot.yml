version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rustcrypto-kdf:
        patterns:
          - hkdf
          - hmac
          - pbkdf2
          - sha2
    ignore:
      # aes/cbc 0.x minor releases move between RustCrypto cipher API generations.
      # Revisit as an intentional grouped block-cipher migration.
      - dependency-name: aes
        update-types:
          - version-update:semver-minor
      - dependency-name: cbc
        update-types:
          - version-update:semver-minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
