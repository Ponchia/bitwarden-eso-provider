version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rustcrypto-kdf:
        patterns:
          - hkdf
          - hmac
          - pbkdf2
          - sha2
    ignore:
      # aes/cbc 0.x minor releases move between RustCrypto cipher API generations.
      # Revisit as an intentional grouped block-cipher migration.
      - dependency-name: aes
        update-types:
          - version-update:semver-minor
      - dependency-name: cbc
        update-types:
          - version-update:semver-minor
      # reqwest 0.x minor releases can rename TLS features and need a
      # deliberate HTTP-client migration instead of an automatic PR.
      - dependency-name: reqwest
        update-types:
          - version-update:semver-minor

  - package-ecosystem: cargo
    directory: /crates/bweso-bitwarden/fuzz
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    ignore:
      # The fuzz workspace resolves through the parent crate, so mirror the
      # known incompatible 0.x minor-release blocks from the main workspace.
      - dependency-name: aes
        update-types:
          - version-update:semver-minor
      - dependency-name: cbc
        update-types:
          - version-update:semver-minor
      - dependency-name: reqwest
        update-types:
          - version-update:semver-minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
