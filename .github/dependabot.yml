version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rustcrypto-kdf:
        patterns:
          - hkdf
          - hmac
          - pbkdf2
          - sha2
    ignore:
      # cbc 0.2 moves to cipher 0.5 while the current aes stack still uses cipher 0.4.
      # Revisit as an intentional grouped block-cipher migration.
      - dependency-name: cbc
        update-types:
          - version-update:semver-minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
