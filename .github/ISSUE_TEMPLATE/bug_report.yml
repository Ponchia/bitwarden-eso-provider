name: Bug report
description: Report a reproducible problem with the provider, Helm chart, or examples.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not paste real secrets, master passwords, API tokens, vault item IDs, vault item names, Kubernetes Secret values, kubeconfigs, or full debug logs containing sensitive data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - Bitwarden Cloud US
        - Bitwarden Cloud EU
        - Vaultwarden
        - Self-hosted Bitwarden
        - Other or unknown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Provider version or image digest
      placeholder: ghcr.io/owner/bitwarden-eso-provider@sha256:...
    validations:
      required: true
  - type: input
    id: eso_version
    attributes:
      label: External Secrets Operator version
      placeholder: v0.10.0
  - type: textarea
    id: manifests
    attributes:
      label: Minimal redacted manifests
      description: Include only the SecretStore and ExternalSecret fields needed to reproduce the problem. Redact all sensitive values.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs and events
      description: Include provider logs, ExternalSecret status, or Kubernetes events after removing sensitive data.
      render: text
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Deploy ...
        2. Create ...
        3. Observe ...
    validations:
      required: true
