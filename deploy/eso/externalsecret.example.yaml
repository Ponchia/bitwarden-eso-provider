apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-database
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: app-database
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      mergePolicy: Merge
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        # Prefer id:<item-id> for production so item renames cannot change the
        # selected source. name:<item-name> is available for convenience.
        key: id:00000000-0000-0000-0000-000000000000
        # For migrated Kubernetes keys, use field.<key> to select a custom
        # field and avoid collisions with Bitwarden login.username/password.
        property: field.DATABASE_URL
