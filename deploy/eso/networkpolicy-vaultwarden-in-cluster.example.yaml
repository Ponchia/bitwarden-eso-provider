apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bweso-vaultwarden-egress
  namespace: bweso-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bitwarden-eso-provider
  policyTypes:
    - Egress
  egress:
    # DNS. Adjust namespace/labels if your DNS pods are not in kube-system.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # If the provider reaches Vaultwarden through an in-cluster ingress while
    # preserving the public hostname for TLS/Host routing, allow that ingress.
    # This example matches the default k3s Traefik labels.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 443
    # If the provider reaches Vaultwarden directly, the endpoint still needs to
    # be HTTPS unless it is localhost. Prefer an ingress, mesh, or gateway that
    # preserves the public Vaultwarden hostname for TLS verification. If your
    # Vaultwarden pods terminate TLS themselves, adapt this direct-pod rule.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vaultwarden
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vaultwarden
      ports:
        - protocol: TCP
          port: 443
