apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bweso-vaultwarden-egress
  namespace: bweso-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bitwarden-eso-provider
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vaultwarden
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vaultwarden
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
