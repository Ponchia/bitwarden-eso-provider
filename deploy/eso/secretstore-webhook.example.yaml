apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vaultwarden
spec:
  provider:
    webhook:
      url: "http://vwso-eso-webhook.vwso-system.svc.cluster.local:8080/v1/resolve"
      method: POST
      body: |
        {
          "remoteRef": {
            "key": "{{ .remoteRef.key }}",
            "property": "{{ .remoteRef.property }}"
          }
        }
      result:
        jsonPath: "$.data.{{ .remoteRef.property }}"
      timeout: 10s

