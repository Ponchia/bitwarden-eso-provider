apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden-shared
  annotations:
    bweso.dev/security-note: "Prefer namespace-local SecretStore resources unless this shared trust boundary is intentional."
spec:
  provider:
    webhook:
      url: "http://bweso-bitwarden-eso-provider.bweso-system.svc.cluster.local:8080/v1/resolve"
      method: POST
      headers:
        Content-Type: application/json
        Authorization: Bearer {{ index .auth "webhook-token" }}
      secrets:
        - name: auth
          secretRef:
            name: bweso-credentials
            namespace: bweso-system
      body: |
        {
          "remoteRef": {
            "key": {{ .remoteRef.key | toJson }},
            "property": {{ .remoteRef.property | toJson }}
          }
        }
      result:
        jsonPath: "$.data.value"
      timeout: 10s
