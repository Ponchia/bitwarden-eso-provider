apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-config
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: app-config
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      mergePolicy: Merge
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000006
        property: field.DATABASE_URL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  annotations:
    secret.reloader.stakater.com/reload: app-config
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: ghcr.io/example/app:0.1.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
              ephemeral-storage: 16Mi
            limits:
              cpu: 250m
              memory: 128Mi
              ephemeral-storage: 64Mi
          envFrom:
            - secretRef:
                name: app-config
