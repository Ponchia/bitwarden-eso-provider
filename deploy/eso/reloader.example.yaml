apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-config
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: app-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000006
        property: DATABASE_URL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  annotations:
    secret.reloader.stakater.com/reload: app-config
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
    spec:
      containers:
        - name: app
          image: ghcr.io/example/app:0.1.0
          envFrom:
            - secretRef:
                name: app-config
