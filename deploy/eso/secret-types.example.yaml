apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: registry-pull-secret
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: registry-pull-secret
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      mergePolicy: Merge
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000001
        # Custom field named ".dockerconfigjson"; the double dot is expected.
        property: field..dockerconfigjson
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-basic-auth
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: app-basic-auth
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      mergePolicy: Merge
  data:
    - secretKey: username
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000002
        property: field.username
    - secretKey: password
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000002
        property: field.password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: deploy-ssh-key
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: deploy-ssh-key
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: kubernetes.io/ssh-auth
      mergePolicy: Merge
  data:
    # checkov:skip=CKV_SECRET_6:example Kubernetes Secret data key, not a secret value
    - secretKey: ssh-privatekey
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000003
        property: sshKey.privateKey
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-files
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: app-files
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      mergePolicy: Merge
      data:
        empty.conf: ""
  data:
    - secretKey: config.yaml
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000004
        property: field.config.yaml
    - secretKey: tls.crt
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000005
        property: field.tls.crt
