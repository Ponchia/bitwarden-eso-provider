apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: registry-pull-secret
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: registry-pull-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000001
        property: dockerconfigjson
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-basic-auth
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: app-basic-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000002
        property: username
    - secretKey: password
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000002
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: deploy-ssh-key
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: deploy-ssh-key
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/ssh-auth
      data:
        ssh-privatekey: "{{ .privateKey }}"
  data:
    - secretKey: privateKey
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000003
        property: sshKey.privateKey
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-files
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: SecretStore
  target:
    name: app-files
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        config.yaml: "{{ .configYaml }}"
        tls.crt: "{{ .tlsCrt }}"
  data:
    - secretKey: configYaml
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000004
        property: config.yaml
    - secretKey: tlsCrt
      remoteRef:
        key: id:00000000-0000-0000-0000-000000000005
        property: tls.crt
