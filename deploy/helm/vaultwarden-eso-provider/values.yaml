replicaCount: 1

image:
  repository: ghcr.io/ponchia/vaultwarden-eso-provider
  pullPolicy: IfNotPresent
  tag: ""
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
hostAliases: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 8080
  annotations: {}

config:
  # Set singleOriginUrl for Vaultwarden or self-hosted Bitwarden deployments
  # where identity and API routes share one origin.
  singleOriginUrl: ""
  # Or set both identityUrl and apiUrl for Bitwarden Cloud/split endpoints.
  identityUrl: ""
  apiUrl: ""
  cacheTtlSeconds: 60
  httpConnectTimeoutSeconds: 5
  httpRequestTimeoutSeconds: 25
  deviceIdentifier: vaultwarden-eso-provider
  deviceName: Vaultwarden ESO Provider
  deviceType: 22
  # Max concurrent /v1/resolve requests. Excess requests are shed with 503.
  # Set to 0 to disable the cap (not recommended for production).
  resolveConcurrencyLimit: 16

# Optional PEM CA bundle for Vaultwarden installs on a private CA. When set,
# the contents are mounted at /var/run/secrets/bweso-ca/ca.pem and
# BWESO_CA_BUNDLE_FILE points at it. Certificates supplement (not replace)
# the system trust store.
caBundle:
  # Inline PEM (multi-cert OK). Mutually exclusive with existingSecret.
  pem: ""
  existingSecret:
    name: ""
    key: ca.pem

selectorPolicy:
  # Empty lists mean allow every remoteRef.key visible to the configured
  # Bitwarden/Vaultwarden account. Configure one or both lists to deny by
  # default and allow only matching selectors.
  allowedKeys: []
  allowedKeyPrefixes: []
  # Optional: source the allow-list from an existing ConfigMap instead of (or
  # in addition to) the inline lists above. The provider re-reads the mounted
  # files every reloadIntervalSeconds, so updating the ConfigMap (e.g. via
  # GitOps) changes the policy WITHOUT restarting the provider. Each key holds
  # one entry per line; commas also split, blank lines and `#` comments are
  # ignored. File entries are unioned with the inline lists.
  configMap:
    name: ""
    keys:
      allowedKeys: allowed-keys
      # Leave empty to not wire a prefixes file.
      allowedKeyPrefixes: ""
  # Seconds between policy file re-reads. 0 reads once at startup and never
  # again. Only used when configMap.name is set.
  reloadIntervalSeconds: 30

auth:
  enabled: true
  insecureAllowUnauthenticated: false

credentials:
  # Prefer an existing Secret. Required keys default to:
  # client-id, client-secret, master-password, webhook-token.
  existingSecret:
    name: ""
    keys:
      clientId: client-id
      clientSecret: client-secret
      masterPassword: master-password
      webhookToken: webhook-token
  # create is useful for local smoke tests. For real installs, prefer an
  # existing Secret because values supplied here can be retained in Helm
  # release history.
  create: false
  clientId: ""
  clientSecret: ""
  masterPassword: ""
  webhookToken: ""

logging:
  rustLog: info,tower_http=info

probes:
  startup:
    enabled: true
    httpGet:
      path: /livez
      port: http
    failureThreshold: 30
    periodSeconds: 2
    timeoutSeconds: 1
  liveness:
    enabled: true
    httpGet:
      path: /livez
      port: http
    failureThreshold: 3
    periodSeconds: 10
    timeoutSeconds: 1
  readiness:
    enabled: true
    httpGet:
      path: /readyz
      port: http
    failureThreshold: 3
    periodSeconds: 5
    timeoutSeconds: 1

metrics:
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    annotations: {}
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: false
    relabelings: []
    metricRelabelings: []

extraEnv: []

resources:
  # PBKDF2-backed accounts usually fit these small defaults. Argon2id accounts
  # may need memory limits near their configured Argon2 memory cost plus
  # operational headroom.
  requests:
    cpu: 25m
    memory: 64Mi
    ephemeral-storage: 16Mi
  limits:
    cpu: 250m
    memory: 128Mi
    ephemeral-storage: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

networkPolicy:
  # NetworkPolicy is intentionally opt-in because backend reachability is
  # cluster-specific. Enable it after adapting ingress and egress rules for ESO,
  # DNS, Bitwarden Cloud, or your in-cluster Vaultwarden/ingress path.
  enabled: false
  annotations: {}
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
