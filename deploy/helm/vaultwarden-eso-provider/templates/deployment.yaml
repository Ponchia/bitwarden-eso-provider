apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bweso.fullname" . }}
  labels:
    {{- include "bweso.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bweso.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bweso.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.podAnnotations .Values.credentials.create .Values.caBundle.pem }}
      annotations:
        {{- if .Values.credentials.create }}
        checksum/credentials-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.caBundle.pem }}
        checksum/ca-bundle-secret: {{ include (print $.Template.BasePath "/ca-bundle-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "bweso.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: vaultwarden-eso-provider
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "bweso.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- if .Values.config.singleOriginUrl }}
            - name: BWESO_SINGLE_ORIGIN_URL
              value: {{ .Values.config.singleOriginUrl | quote }}
            {{- end }}
            {{- if .Values.config.identityUrl }}
            - name: BWESO_IDENTITY_URL
              value: {{ .Values.config.identityUrl | quote }}
            {{- end }}
            {{- if .Values.config.apiUrl }}
            - name: BWESO_API_URL
              value: {{ .Values.config.apiUrl | quote }}
            {{- end }}
            - name: BWESO_CLIENT_ID_FILE
              value: /var/run/secrets/bweso/{{ .Values.credentials.existingSecret.keys.clientId }}
            - name: BWESO_CLIENT_SECRET_FILE
              value: /var/run/secrets/bweso/{{ .Values.credentials.existingSecret.keys.clientSecret }}
            - name: BWESO_MASTER_PASSWORD_FILE
              value: /var/run/secrets/bweso/{{ .Values.credentials.existingSecret.keys.masterPassword }}
            {{- if .Values.auth.enabled }}
            - name: BWESO_WEBHOOK_AUTH_TOKEN_FILE
              value: /var/run/secrets/bweso/{{ .Values.credentials.existingSecret.keys.webhookToken }}
            {{- else if .Values.auth.insecureAllowUnauthenticated }}
            - name: BWESO_INSECURE_ALLOW_UNAUTHENTICATED
              value: "true"
            {{- end }}
            - name: BWESO_CACHE_TTL_SECONDS
              value: {{ .Values.config.cacheTtlSeconds | quote }}
            - name: BWESO_HTTP_CONNECT_TIMEOUT_SECONDS
              value: {{ .Values.config.httpConnectTimeoutSeconds | quote }}
            - name: BWESO_HTTP_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.config.httpRequestTimeoutSeconds | quote }}
            - name: BWESO_DEVICE_IDENTIFIER
              value: {{ .Values.config.deviceIdentifier | quote }}
            - name: BWESO_DEVICE_NAME
              value: {{ .Values.config.deviceName | quote }}
            - name: BWESO_DEVICE_TYPE
              value: {{ .Values.config.deviceType | quote }}
            - name: BWESO_RESOLVE_CONCURRENCY_LIMIT
              value: {{ .Values.config.resolveConcurrencyLimit | quote }}
            {{- if .Values.selectorPolicy.allowedKeys }}
            - name: BWESO_ALLOWED_KEYS
              value: {{ join "," .Values.selectorPolicy.allowedKeys | quote }}
            {{- end }}
            {{- if .Values.selectorPolicy.allowedKeyPrefixes }}
            - name: BWESO_ALLOWED_KEY_PREFIXES
              value: {{ join "," .Values.selectorPolicy.allowedKeyPrefixes | quote }}
            {{- end }}
            {{- if .Values.selectorPolicy.allowAllSelectors }}
            - name: BWESO_ALLOW_ALL_SELECTORS
              value: "true"
            {{- end }}
            {{- if .Values.selectorPolicy.configMap.name }}
            {{- if not (or .Values.selectorPolicy.configMap.keys.allowedKeys .Values.selectorPolicy.configMap.keys.allowedKeyPrefixes) }}
            {{- fail "selectorPolicy.configMap.name is set but neither configMap.keys.allowedKeys nor configMap.keys.allowedKeyPrefixes is configured; the provider would have no policy file to read" }}
            {{- end }}
            {{- if .Values.selectorPolicy.configMap.keys.allowedKeys }}
            - name: BWESO_ALLOWED_KEYS_FILE
              value: /etc/bweso/policy/{{ .Values.selectorPolicy.configMap.keys.allowedKeys }}
            {{- end }}
            {{- if .Values.selectorPolicy.configMap.keys.allowedKeyPrefixes }}
            - name: BWESO_ALLOWED_KEY_PREFIXES_FILE
              value: /etc/bweso/policy/{{ .Values.selectorPolicy.configMap.keys.allowedKeyPrefixes }}
            {{- end }}
            - name: BWESO_POLICY_RELOAD_INTERVAL_SECONDS
              value: {{ .Values.selectorPolicy.reloadIntervalSeconds | quote }}
            {{- end }}
            {{- if or .Values.caBundle.pem .Values.caBundle.existingSecret.name }}
            - name: BWESO_CA_BUNDLE_FILE
              value: /var/run/secrets/bweso-ca/{{ .Values.caBundle.existingSecret.key | default "ca.pem" }}
            {{- end }}
            - name: RUST_LOG
              value: {{ .Values.logging.rustLog | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            {{- omit .Values.probes.startup "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            {{- omit .Values.probes.liveness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            {{- omit .Values.probes.readiness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: credentials
              mountPath: /var/run/secrets/bweso
              readOnly: true
            {{- if or .Values.caBundle.pem .Values.caBundle.existingSecret.name }}
            - name: ca-bundle
              mountPath: /var/run/secrets/bweso-ca
              readOnly: true
            {{- end }}
            {{- if .Values.selectorPolicy.configMap.name }}
            - name: selector-policy
              mountPath: /etc/bweso/policy
              readOnly: true
            {{- end }}
      volumes:
        - name: credentials
          secret:
            secretName: {{ include "bweso.credentialsSecretName" . }}
            defaultMode: 0400
        {{- if .Values.selectorPolicy.configMap.name }}
        - name: selector-policy
          configMap:
            name: {{ .Values.selectorPolicy.configMap.name }}
            defaultMode: 0444
        {{- end }}
        {{- if or .Values.caBundle.pem .Values.caBundle.existingSecret.name }}
        - name: ca-bundle
          secret:
            secretName: {{ if .Values.caBundle.existingSecret.name }}{{ .Values.caBundle.existingSecret.name }}{{ else }}{{ include "bweso.fullname" . }}-ca-bundle{{ end }}
            defaultMode: 0444
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
