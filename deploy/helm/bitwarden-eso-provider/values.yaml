replicaCount: 1

image:
  repository: ghcr.io/ponchia/bitwarden-eso-provider
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
priorityClassName: ""
terminationGracePeriodSeconds: 30

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 8080
  annotations: {}

config:
  # Set singleOriginUrl for Vaultwarden or self-hosted Bitwarden deployments
  # where identity and API routes share one origin.
  singleOriginUrl: ""
  # Or set both identityUrl and apiUrl for Bitwarden Cloud/split endpoints.
  identityUrl: ""
  apiUrl: ""
  cacheTtlSeconds: 60
  deviceIdentifier: bitwarden-eso-provider
  deviceName: Bitwarden ESO Provider
  deviceType: 22

credentials:
  # Prefer an existing Secret. Required keys default to:
  # client-id, client-secret, master-password.
  existingSecret:
    name: ""
    keys:
      clientId: client-id
      clientSecret: client-secret
      masterPassword: master-password
  # create is useful for local smoke tests, but avoid committing secret values
  # in Helm values files.
  create: false
  clientId: ""
  clientSecret: ""
  masterPassword: ""

logging:
  rustLog: info,tower_http=info

probes:
  startup:
    enabled: true
    httpGet:
      path: /livez
      port: http
    failureThreshold: 30
    periodSeconds: 2
    timeoutSeconds: 1
  liveness:
    enabled: true
    httpGet:
      path: /livez
      port: http
    failureThreshold: 3
    periodSeconds: 10
    timeoutSeconds: 1
  readiness:
    enabled: true
    httpGet:
      path: /readyz
      port: http
    failureThreshold: 3
    periodSeconds: 5
    timeoutSeconds: 1

metrics:
  path: /metrics
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    annotations: {}
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: false
    relabelings: []
    metricRelabelings: []

extraEnv: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

networkPolicy:
  enabled: false
  annotations: {}
  ingress: []
  egress: []
