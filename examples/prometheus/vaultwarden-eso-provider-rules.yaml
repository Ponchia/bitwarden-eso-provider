apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vaultwarden-eso-provider
  labels:
    app.kubernetes.io/name: vaultwarden-eso-provider
    app.kubernetes.io/component: observability
spec:
  groups:
    - name: vaultwarden-eso-provider
      rules:
        - alert: VaultwardenEsoProviderNotReady
          expr: bweso_ready == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Vaultwarden ESO Provider is not ready
            description: The provider readiness probe has reported not-ready for at least 5 minutes.
        - alert: VaultwardenEsoResolveErrors
          expr: sum(rate(bweso_resolve_requests_total{outcome="error"}[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Vaultwarden ESO Provider has resolve errors
            description: Secret resolution requests are failing. Inspect ESO ExternalSecret status and provider logs; metrics intentionally omit selector details.
        - alert: VaultwardenEsoCacheRefreshFailures
          expr: sum(rate(bweso_cache_refreshes_total{outcome="failure"}[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Vaultwarden ESO Provider cache refresh is failing
            description: Full vault sync refresh attempts are failing. Check Bitwarden/Vaultwarden reachability and credentials.
        - alert: VaultwardenEsoCacheStale
          expr: bweso_cache_last_success_age_seconds > 600
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Vaultwarden ESO Provider cache has not refreshed recently
            description: The last successful cache refresh is older than 10 minutes. Tune this threshold to the configured cache TTL and expected refresh cadence.
        - alert: VaultwardenEsoPolicyReloadFailures
          expr: sum(rate(bweso_policy_reloads_total{outcome="failure"}[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Vaultwarden ESO Provider selector policy reloads are failing
            description: ConfigMap-backed selector policy reloads are failing; the provider keeps the last known-good policy.
        - alert: VaultwardenEsoPolicyReloadStale
          expr: bweso_policy_last_reload_success_age_seconds > 600
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Vaultwarden ESO Provider selector policy has not reloaded recently
            description: The last successful selector-policy evaluation is older than 10 minutes. Tune this threshold to the configured reload interval.
        - alert: VaultwardenEsoResolveLatencyHigh
          expr: histogram_quantile(0.95, sum(rate(bweso_resolve_duration_seconds_bucket[5m])) by (le)) > 5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Vaultwarden ESO Provider resolve latency is high
            description: P95 resolve latency has exceeded 5 seconds for at least 10 minutes.
